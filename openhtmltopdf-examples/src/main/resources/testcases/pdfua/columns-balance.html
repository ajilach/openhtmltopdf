<html>
<head>
  <title>PDF/UA Balanced Columns Testcase</title>
  <meta name="description" content="Balanced multicolumn example"/>

  <style>
  @page {

  body {
    margin: 0;
    width: 200px;
  }

    column-count: 2;

    column-fill: balance;
  }

    margin: 0 0 8px 0;
  }
  </style>
</head>
<body style="font-family: 'TestFont'; font-size: 12px;">
<h1 style="font-size: 16px; margin: 0 0 10px 0;">Balanced Columns</h1>
<div class="cols">
  <p>Paragraph one contains enough text to require several wrapped lines in the first column.</p>
  <p>Paragraph two adds more content so the balancing code has to distribute text across both columns.</p>
  <p>Paragraph three keeps the example simple while still exercising accessible PDF output.</p>
</div>
</body>
